<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div style="display: flex; justify-content: flex-end; gap: 10px;">
      <button class="toggle-theme" onclick="toggleDarkMode()">Toggle Dark Mode</button>
      <a href="/admin.html" id="adminButton" class="button" style="display: none;">Admin Panel</a>
      <a href="/" class="button">Camera Sizing Tool</a>
    </div>

    <h2>User Profile</h2>
    <h3>Welcome, <span id="username"></span>!</h3>

    <!-- Update Profile Form -->
    <form id="updateProfileForm" class="form-section">
      <h3>Update Profile</h3>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="real_name">Full Name:</label>
        <input type="text" id="real_name" name="real_name" required />
      </div>

      <div class="form-group">
        <label for="date_of_birth">Date of Birth:</label>
        <input type="date" id="date_of_birth" name="date_of_birth" required />
      </div>

      <div class="form-group">
        <button type="submit" class="button">Update Profile</button>
      </div>

      <p id="profile-update-message" class="validation-message"></p>
    </form>

    <!-- Password Update Form -->
    <form id="updatePasswordForm" class="form-section">
      <h3>Change Password</h3>

      <div class="form-group">
        <label for="oldPassword">Old Password:</label>
        <input type="password" id="oldPassword" name="oldPassword" placeholder="Enter old password" required />
      </div>

      <div class="form-group">
        <label for="newPassword">New Password:</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required />
      </div>

      <div class="form-group">
        <label for="confirmNewPassword">Confirm New Password:</label>
        <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="Confirm new password" required />
        <p id="password-error" class="validation-error" style="display: none;">Passwords do not match.</p>
      </div>

      <div class="form-group">
        <button type="submit" class="button">Update Password</button>
      </div>

      <p id="password-update-message" class="validation-message"></p>
    </form>

    <p><a href="/logout" class="button">Logout</a></p>
  </div>

  <script>
    // 🔹 Dark Mode Toggle
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    // 🔹 Load User Data
    window.onload = function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
      }

      fetch('/get-user')
        .then(response => {
          if (!response.ok) throw new Error('Failed to fetch user data.');
          return response.json();
        })
        .then(data => {
          document.getElementById("username").textContent = data.username;
          document.getElementById("email").value = data.email;
          document.getElementById("real_name").value = data.real_name;
          document.getElementById("date_of_birth").value = data.date_of_birth;
          
          // Show Admin Panel button if user is an Owner
          if (data.role === "owner") {
            console.log("Owner detected - Showing admin button");
            document.getElementById("adminButton").style.display = "inline-block";
          } else {
            console.log("Not an owner - Admin button hidden");
          }
        })
        .catch(error => {
          console.error('Error fetching user data:', error);
          alert("Failed to load profile.");
        });
    };

    // 🔹 Update Profile (AJAX)
    document.getElementById("updateProfileForm").addEventListener("submit", function (event) {
        event.preventDefault();

        const formData = new FormData(this);
        const data = Object.fromEntries(formData);

        fetch('/update-profile', {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
        .then(response => {
            if (!response.ok) {
                return response.text().then(text => { throw new Error(text); });
            }
            return response.json();
        })
        .then(data => {
            document.getElementById("profile-update-message").textContent = data.message;
            document.getElementById("profile-update-message").style.color = "green";
        })
        .catch(error => {
            console.error("Error updating profile:", error);
            document.getElementById("profile-update-message").textContent = error.message || "Error updating profile.";
            document.getElementById("profile-update-message").style.color = "red";
        });
    });

    // 🔹 Validate Password Change
    function validatePasswordChange() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmNewPassword = document.getElementById('confirmNewPassword').value;
      const errorText = document.getElementById('password-error');

      if (newPassword !== confirmNewPassword) {
        errorText.style.display = 'block';
        return false;
      } else {
        errorText.style.display = 'none';
        return true;
      }
    }

    // 🔹 Update Password (AJAX)
    document.getElementById("updatePasswordForm").addEventListener("submit", function (event) {
      event.preventDefault(); // Prevent default form submission

      if (!validatePasswordChange()) return;

      const formData = new FormData(this);
      const data = Object.fromEntries(formData);

      fetch('/update-password', {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
      .then(response => {
        if (!response.ok) return response.text().then(text => { throw new Error(text); });
        return response.json();
      })
      .then(data => {
        document.getElementById("password-update-message").textContent = data.message;
        document.getElementById("password-update-message").style.color = "green";
      })
      .catch(error => {
        console.error("Error updating password:", error);
        document.getElementById("password-update-message").textContent = "Error updating password. Try again.";
        document.getElementById("password-update-message").style.color = "red";
      });
    });
  </script>
</body>
</html>
