<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – Camera Server Sizing Calculator</title>
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --teal:       #1b7a7a;
      --teal-light: #22a0a0;
      --teal-dim:   rgba(27,122,122,0.12);
      --teal-line:  rgba(27,122,122,0.22);
      --blue-accent:#3498db;
      --ice:        rgb(191,240,255);
      --text:       #1e2c2c;
      --muted:      #5a6e6e;
      --card:       rgba(255,255,255,0.72);
      --border:     rgba(27,122,122,0.16);
      --shadow:     0 8px 32px rgba(27,122,122,0.10);
    }
    body.dark-mode {
      --text:   #e0f4f4;
      --muted:  #7aadad;
      --card:   rgba(18,36,40,0.88);
      --border: rgba(52,152,219,0.22);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
 
    *, *::before, *::after { box-sizing: border-box; }
 
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      background: #f0fafa;
      background-image:
        linear-gradient(rgba(27,122,122,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(27,122,122,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    body.dark-mode {
      background-color: #0b1a1e;
      background-image:
        linear-gradient(rgba(27,122,122,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(27,122,122,0.07) 1px, transparent 1px);
    }
 
    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 24px 48px;
    }
 
    /* ── Top bar ── */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .top-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 5px;
      border: 1.5px solid var(--teal-line);
      background: transparent;
      color: var(--teal);
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.18s;
      text-decoration: none;
      display: inline-block;
    }
    .top-btn:hover { background: var(--teal-dim); }
    body.dark-mode .top-btn { color: var(--ice); }
    .top-btn.danger {
      color: #c0392b;
      border-color: rgba(192,57,43,0.3);
    }
    .top-btn.danger:hover { background: rgba(192,57,43,0.08); }
 
    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 14px;
      margin-bottom: 36px;
      border-bottom: 2px solid var(--teal);
      animation: rise 0.5s ease both;
    }
    .page-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .page-header-left img.cam-icon { height: 52px; width: 52px; }
    .page-header-left h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin: 0;
      color: var(--teal);
      letter-spacing: -0.01em;
    }
    .page-header-right img.studio-logo {
      height: 48px;
      width: auto;
      opacity: 0.75;
    }
 
    /* ── Welcome bar ── */
    .welcome-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 24px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      animation: rise 0.5s 0.05s ease both;
    }
    .welcome-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--teal-dim);
      border: 2px solid var(--teal-line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--teal);
      flex-shrink: 0;
    }
    .welcome-text { flex: 1; }
    .welcome-text h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--teal);
      margin: 0 0 2px 0;
    }
    .welcome-text p {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0;
    }
 
    /* ── Two-column layout ── */
    .profile-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
 
    /* ── Cards ── */
    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      animation: rise 0.5s ease both;
    }
    .profile-card:nth-child(2) { animation-delay: 0.07s; }
 
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--teal);
      margin: 0 0 4px 0;
    }
    .card-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0 0 22px 0;
    }
    .card-divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 22px 0;
    }
 
    /* ── Fields ── */
    .field-group { margin-bottom: 14px; }
    .field-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--teal);
      margin-bottom: 5px;
      letter-spacing: 0.02em;
    }
    .field-group input {
      width: 100%;
      padding: 10px 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      background: rgba(255,255,255,0.8);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    body.dark-mode .field-group input {
      background: rgba(27,122,122,0.08);
      color: var(--text);
    }
    .field-group input::placeholder { color: #aac4c4; }
    .field-group input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(27,122,122,0.12);
    }
    .field-group input.valid   { border-color: #27ae60; }
    .field-group input.invalid { border-color: #c0392b; }
 
    .field-hint {
      font-size: 0.73rem;
      margin: 5px 0 0 0;
      line-height: 1.4;
      min-height: 1em;
    }
    .field-hint.error { color: #c0392b; }
    .field-hint.ok    { color: #27ae60; }
    .field-hint.warn  { color: #e67e22; }
 
    /* Strength bar */
    .strength-bar-wrap {
      height: 4px;
      background: var(--teal-dim);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }
 
    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--ice);
      background: var(--teal);
      border: none;
      border-radius: 7px;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.18s, transform 0.15s, box-shadow 0.18s;
    }
    .btn-primary:hover {
      background: var(--teal-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(27,122,122,0.3);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
 
    /* ── Status messages ── */
    .status-msg {
      font-size: 0.8rem;
      border-radius: 6px;
      padding: 9px 13px;
      margin-bottom: 14px;
      display: none;
      line-height: 1.4;
    }
    .status-msg.error {
      color: #c0392b;
      background: rgba(192,57,43,0.08);
      border: 1px solid rgba(192,57,43,0.2);
      display: block;
    }
    .status-msg.success {
      color: #27ae60;
      background: rgba(39,174,96,0.08);
      border: 1px solid rgba(39,174,96,0.2);
      display: block;
    }
 
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    /* ── Responsive ── */
    @media (max-width: 760px) {
      .profile-layout { grid-template-columns: 1fr; }
      .page-header-left h1 { font-size: 1.5rem; }
    }
    @media (max-width: 480px) {
      .page-header-right { display: none; }
    }
  </style>
</head>
<body>
<div class="page-wrap">
 
  <!-- Top bar -->
  <div class="top-bar">
    <button class="top-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    <button id="adminButton" class="top-btn" style="display:none;" onclick="window.location.href='/admin.html'">Admin Panel</button>
    <button class="top-btn" onclick="window.location.href='/calc-tool.html'">Camera Sizing Tool</button>
    <a href="/logout" class="top-btn danger">Logout</a>
  </div>
 
  <!-- Header -->
  <div class="page-header">
    <div class="page-header-left">
      <img class="cam-icon" src="/camera.svg" alt="Camera icon" />
      <h1>Camera Server Sizing Calculator</h1>
    </div>
    <div class="page-header-right">
      <img class="studio-logo" src="/tragicstudios.svg" alt="Tragic Studios" />
    </div>
  </div>
 
  <!-- Welcome bar -->
  <div class="welcome-bar">
    <div class="welcome-avatar" id="avatarInitial">?</div>
    <div class="welcome-text">
      <h2>Welcome back, <span id="usernameDisplay">—</span></h2>
      <p>Manage your account details and password below.</p>
    </div>
  </div>
 
  <!-- Two-column layout -->
  <div class="profile-layout">
 
    <!-- Update Profile -->
    <div class="profile-card">
      <h3 class="card-title">Profile Details</h3>
      <p class="card-sub">Update your name and email address.</p>
      <div class="card-divider"></div>
 
      <div class="status-msg" id="profileStatus"></div>
 
      <form id="updateProfileForm">
        <div class="field-group">
          <label for="real_name">Full Name</label>
          <input type="text" id="real_name" name="real_name" placeholder="Jane Smith" required autocomplete="name" />
        </div>
        <div class="field-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="jane@example.com" required autocomplete="email" />
        </div>
        <button type="submit" class="btn-primary" id="profileBtn">Save Changes</button>
      </form>
    </div>
 
    <!-- Change Password -->
    <div class="profile-card">
      <h3 class="card-title">Change Password</h3>
      <p class="card-sub">Choose a strong password with uppercase, numbers, and symbols.</p>
      <div class="card-divider"></div>
 
      <div class="status-msg" id="passwordStatus"></div>
 
      <form id="updatePasswordForm">
        <div class="field-group">
          <label for="oldPassword">Current Password</label>
          <input type="password" id="oldPassword" name="oldPassword" placeholder="••••••••••" required autocomplete="current-password" />
        </div>
        <div class="field-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" name="newPassword" placeholder="••••••••••" required autocomplete="new-password" />
          <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
          <p class="field-hint" id="passwordHint"></p>
        </div>
        <div class="field-group">
          <label for="confirmNewPassword">Confirm New Password</label>
          <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="••••••••••" required autocomplete="new-password" />
          <p class="field-hint" id="matchHint"></p>
        </div>
        <button type="submit" class="btn-primary" id="passwordBtn">Update Password</button>
      </form>
    </div>
 
  </div><!-- /profile-layout -->
</div><!-- /page-wrap -->
 
<script>
  /* ── Dark mode ── */
  function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
  }
 
  /* ── Load user data ── */
  window.onload = function () {
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
 
    fetch('/get-user')
      .then(r => { if (!r.ok) throw new Error('Failed to fetch user data.'); return r.json(); })
      .then(data => {
        document.getElementById('usernameDisplay').textContent = data.username;
        document.getElementById('avatarInitial').textContent = (data.username || '?')[0].toUpperCase();
        document.getElementById('email').value = data.email || '';
        document.getElementById('real_name').value = data.real_name || '';
 
        if (data.role === 'owner') {
          document.getElementById('adminButton').style.display = 'inline-block';
        }
      })
      .catch(err => {
        console.error('Error fetching user data:', err);
        showStatus('profileStatus', 'error', 'Failed to load profile data.');
      });
  };
 
  /* ── Status helper ── */
  function showStatus(id, type, message) {
    const el = document.getElementById(id);
    el.textContent = message;
    el.className = 'status-msg ' + type;
    // Auto-clear success after 4s
    if (type === 'success') setTimeout(() => { el.className = 'status-msg'; }, 4000);
  }
 
  /* ── Update profile ── */
  document.getElementById('updateProfileForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const btn = document.getElementById('profileBtn');
    btn.disabled = true;
    btn.textContent = 'Saving…';
 
    const data = Object.fromEntries(new FormData(this));
 
    fetch('/update-profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(r => { if (!r.ok) return r.text().then(t => { throw new Error(t); }); return r.json(); })
    .then(data => showStatus('profileStatus', 'success', data.message || 'Profile updated successfully.'))
    .catch(err => showStatus('profileStatus', 'error', err.message || 'Error updating profile.'))
    .finally(() => { btn.disabled = false; btn.textContent = 'Save Changes'; });
  });
 
  /* ── Password strength ── */
  function getStrength(pw) {
    let score = 0;
    if (pw.length >= 8)                    score++;
    if (pw.length >= 12)                   score++;
    if (/[A-Z]/.test(pw))                  score++;
    if (/[0-9]/.test(pw))                  score++;
    if (/[@$!%*?&^#()\-_=+]/.test(pw))    score++;
    return score;
  }
 
  document.getElementById('newPassword').addEventListener('input', function () {
    const score = getStrength(this.value);
    const bar = document.getElementById('strengthBar');
    const hint = document.getElementById('passwordHint');
    bar.style.width = Math.min(score / 5 * 100, 100) + '%';
 
    if (score <= 1) {
      bar.style.background = '#c0392b';
      hint.textContent = 'Too weak — add length, uppercase, numbers, and symbols.';
      hint.className = 'field-hint error';
      this.classList.remove('valid'); this.classList.add('invalid');
    } else if (score <= 3) {
      bar.style.background = '#e67e22';
      hint.textContent = 'Moderate — try adding more complexity.';
      hint.className = 'field-hint warn';
      this.classList.remove('valid', 'invalid');
    } else {
      bar.style.background = '#27ae60';
      hint.textContent = '✔ Strong password';
      hint.className = 'field-hint ok';
      this.classList.remove('invalid'); this.classList.add('valid');
    }
 
    if (document.getElementById('confirmNewPassword').value) validateMatch();
  });
 
  /* ── Password match ── */
  document.getElementById('confirmNewPassword').addEventListener('input', validateMatch);
 
  function validateMatch() {
    const pw  = document.getElementById('newPassword').value;
    const cpw = document.getElementById('confirmNewPassword').value;
    const hint = document.getElementById('matchHint');
    const el   = document.getElementById('confirmNewPassword');
 
    if (!cpw) { hint.textContent = ''; el.classList.remove('valid', 'invalid'); return true; }
 
    if (pw === cpw) {
      hint.textContent = '✔ Passwords match';
      hint.className = 'field-hint ok';
      el.classList.remove('invalid'); el.classList.add('valid');
      return true;
    } else {
      hint.textContent = 'Passwords do not match.';
      hint.className = 'field-hint error';
      el.classList.remove('valid'); el.classList.add('invalid');
      return false;
    }
  }
 
  /* ── Update password ── */
  document.getElementById('updatePasswordForm').addEventListener('submit', function (e) {
    e.preventDefault();
 
    if (getStrength(document.getElementById('newPassword').value) <= 1) {
      showStatus('passwordStatus', 'error', 'Please choose a stronger password.');
      return;
    }
    if (!validateMatch()) {
      showStatus('passwordStatus', 'error', 'Passwords do not match.');
      return;
    }
 
    const btn = document.getElementById('passwordBtn');
    btn.disabled = true;
    btn.textContent = 'Updating…';
 
    const data = Object.fromEntries(new FormData(this));
 
    fetch('/update-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(r => { if (!r.ok) return r.text().then(t => { throw new Error(t); }); return r.json(); })
    .then(data => {
      showStatus('passwordStatus', 'success', data.message || 'Password updated successfully.');
      document.getElementById('updatePasswordForm').reset();
      document.getElementById('strengthBar').style.width = '0';
      document.getElementById('passwordHint').textContent = '';
      document.getElementById('matchHint').textContent = '';
    })
    .catch(err => showStatus('passwordStatus', 'error', err.message || 'Error updating password.'))
    .finally(() => { btn.disabled = false; btn.textContent = 'Update Password'; });
  });
</script>
</body>
</html>
