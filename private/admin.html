<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – Camera Server Sizing Calculator</title>
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    :root {
      --teal:       #1b7a7a;
      --teal-light: #22a0a0;
      --teal-dim:   rgba(27,122,122,0.12);
      --teal-line:  rgba(27,122,122,0.22);
      --ice:        rgb(191,240,255);
      --text:       #1e2c2c;
      --muted:      #5a6e6e;
      --card:       rgba(255,255,255,0.72);
      --border:     rgba(27,122,122,0.16);
      --shadow:     0 8px 32px rgba(27,122,122,0.10);
    }
    body.dark-mode {
      --text:   #e0f4f4;
      --muted:  #7aadad;
      --card:   rgba(18,36,40,0.88);
      --border: rgba(52,152,219,0.22);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
 
    *, *::before, *::after { box-sizing: border-box; }
 
    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      background: #f0fafa;
      background-image:
        linear-gradient(rgba(27,122,122,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(27,122,122,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    body.dark-mode {
      background-color: #0b1a1e;
      background-image:
        linear-gradient(rgba(27,122,122,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(27,122,122,0.07) 1px, transparent 1px);
    }
 
    .page-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px 48px;
    }
 
    /* ── Top bar ── */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .top-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 5px;
      border: 1.5px solid var(--teal-line);
      background: transparent;
      color: var(--teal);
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.18s;
    }
    .top-btn:hover { background: var(--teal-dim); }
    body.dark-mode .top-btn { color: var(--ice); }
    .top-btn.danger { color: #c0392b; border-color: rgba(192,57,43,0.3); }
    .top-btn.danger:hover { background: rgba(192,57,43,0.08); }
 
    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 14px;
      margin-bottom: 36px;
      border-bottom: 2px solid var(--teal);
      animation: rise 0.5s ease both;
    }
    .page-header-left { display: flex; align-items: center; gap: 14px; }
    .page-header-left img.cam-icon { height: 52px; width: 52px; }
    .page-header-left h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin: 0;
      color: var(--teal);
      letter-spacing: -0.01em;
    }
    .page-header-right img.studio-logo { height: 48px; width: auto; opacity: 0.75; }
 
    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      animation: rise 0.5s 0.05s ease both;
    }
    .stat-chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 14px 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      min-width: 120px;
    }
    .stat-chip-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--teal);
      line-height: 1;
    }
    .stat-chip-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.67rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }
 
    /* ── Table card ── */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      overflow: hidden;
      animation: rise 0.5s 0.1s ease both;
      margin-bottom: 20px;
    }
 
    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }
    .table-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: var(--teal);
      margin: 0;
    }
    .table-toolbar-right { display: flex; gap: 8px; align-items: center; }
 
    .search-input {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      padding: 7px 13px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      background: rgba(255,255,255,0.7);
      color: var(--text);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      width: 200px;
    }
    body.dark-mode .search-input { background: rgba(27,122,122,0.08); color: var(--text); }
    .search-input::placeholder { color: #aac4c4; }
    .search-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(27,122,122,0.12); }
 
    /* ── Table ── */
    .table-scroll { overflow-x: auto; }
 
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    thead tr {
      background: var(--teal-dim);
      border-bottom: 2px solid var(--teal-line);
    }
    thead th {
      font-family: 'DM Mono', monospace;
      font-size: 0.67rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--teal);
      padding: 11px 14px;
      text-align: left;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--teal-dim); }
    tbody td {
      padding: 10px 14px;
      color: var(--text);
      vertical-align: middle;
      white-space: nowrap;
    }
    .td-muted { color: var(--muted); font-size: 0.78rem; }
 
    /* Inline inputs */
    .tbl-input {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      padding: 5px 9px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: rgba(255,255,255,0.75);
      color: var(--text);
      outline: none;
      width: 130px;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    body.dark-mode .tbl-input { background: rgba(27,122,122,0.1); color: var(--text); }
    .tbl-input:focus { border-color: var(--teal); box-shadow: 0 0 0 2px rgba(27,122,122,0.12); }
 
    .tbl-select {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      padding: 5px 9px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: rgba(255,255,255,0.75);
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: border-color 0.18s;
    }
    body.dark-mode .tbl-select { background: rgba(27,122,122,0.1); color: var(--text); }
    .tbl-select:focus { border-color: var(--teal); }
 
    /* Role & status badges */
    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge-owner  { background: rgba(52,152,219,0.15); color: #2980b9; border: 1px solid rgba(52,152,219,0.3); }
    .badge-admin  { background: rgba(27,122,122,0.15); color: var(--teal); border: 1px solid var(--teal-line); }
    .badge-user   { background: rgba(90,110,110,0.1);  color: var(--muted); border: 1px solid rgba(90,110,110,0.2); }
    .badge-active    { background: rgba(39,174,96,0.12);  color: #27ae60; border: 1px solid rgba(39,174,96,0.25); }
    .badge-suspended { background: rgba(230,126,34,0.12); color: #e67e22; border: 1px solid rgba(230,126,34,0.25); }
    .badge-banned    { background: rgba(192,57,43,0.12);  color: #c0392b; border: 1px solid rgba(192,57,43,0.25); }
 
    /* Action buttons */
    .btn-update {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 5px;
      border: 1.5px solid var(--teal-line);
      background: var(--teal-dim);
      color: var(--teal);
      cursor: pointer;
      transition: background 0.18s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-update:hover { background: var(--teal); color: var(--ice); transform: translateY(-1px); }
 
    .btn-delete {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 5px;
      border: 1.5px solid rgba(192,57,43,0.3);
      background: rgba(192,57,43,0.08);
      color: #c0392b;
      cursor: pointer;
      transition: background 0.18s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-delete:hover { background: #c0392b; color: #fff; transform: translateY(-1px); }
 
    /* Profile pic */
    .profile-pic {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--teal-line);
    }
    .no-pic {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--teal-dim);
      border: 2px solid var(--teal-line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      color: var(--teal);
    }
 
    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      z-index: 9999;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #27ae60; color: #fff; }
    .toast.error   { background: #c0392b; color: #fff; }
 
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .empty-state-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
 
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    @media (max-width: 600px) {
      .page-header-left h1 { font-size: 1.4rem; }
      .page-header-right { display: none; }
      .search-input { width: 140px; }
    }
  </style>
</head>
<body>
<div class="page-wrap">
 
  <!-- Top bar -->
  <div class="top-bar">
    <button class="top-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    <button class="top-btn" onclick="window.location.href='/calc-tool.html'">Camera Sizing Tool</button>
    <button class="top-btn" onclick="window.location.href='/profile'">Profile</button>
    <button class="top-btn danger" onclick="window.location.href='/logout'">Logout</button>
  </div>
 
  <!-- Header -->
  <div class="page-header">
    <div class="page-header-left">
      <img class="cam-icon" src="/camera.svg" alt="Camera icon" />
      <h1>Admin Panel</h1>
    </div>
    <div class="page-header-right">
      <img class="studio-logo" src="/tragicstudios.svg" alt="Tragic Studios" />
    </div>
  </div>
 
  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-chip">
      <div class="stat-chip-val" id="statTotal">—</div>
      <div class="stat-chip-label">Total Users</div>
    </div>
    <div class="stat-chip">
      <div class="stat-chip-val" id="statActive">—</div>
      <div class="stat-chip-label">Active</div>
    </div>
    <div class="stat-chip">
      <div class="stat-chip-val" id="statSuspended">—</div>
      <div class="stat-chip-label">Suspended</div>
    </div>
    <div class="stat-chip">
      <div class="stat-chip-val" id="statBanned">—</div>
      <div class="stat-chip-label">Banned</div>
    </div>
  </div>
 
  <!-- Table card -->
  <div class="table-card">
    <div class="table-toolbar">
      <h2 class="table-title">User Management</h2>
      <div class="table-toolbar-right">
        <input class="search-input" type="text" id="searchInput" placeholder="Search users…" oninput="filterTable()" />
        <button class="top-btn" onclick="fetchUsers()">↻ Refresh</button>
      </div>
    </div>
    <div class="table-scroll">
      <table id="usersTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>User</th>
            <th>Email</th>
            <th>Full Name</th>
            <th>Role</th>
            <th>Status</th>
            <th>Last Login</th>
            <th>Created</th>
            <th>Pic</th>
            <th>Update</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="11"><div class="empty-state"><span class="empty-state-icon">⏳</span>Loading users…</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
 
</div><!-- /page-wrap -->
 
<!-- Toast -->
<div class="toast" id="toast"></div>
 
<script>
  /* ── Dark mode ── */
  function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
  }
 
  document.addEventListener('DOMContentLoaded', function () {
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    fetchUsers();
  });
 
  /* ── Toast ── */
  function showToast(message, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = message;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }
 
  /* ── Fetch users ── */
  let allUsers = [];
 
  function fetchUsers() {
    fetch('/admin/get-users', { credentials: 'include' })
      .then(r => { if (!r.ok) throw new Error('Failed to fetch users'); return r.json(); })
      .then(users => {
        allUsers = users;
        updateStats(users);
        renderTable(users);
      })
      .catch(err => {
        console.error('Error fetching users:', err);
        document.getElementById('tableBody').innerHTML =
          `<tr><td colspan="11"><div class="empty-state"><span class="empty-state-icon">⚠️</span>Failed to load users.</div></td></tr>`;
      });
  }
 
  /* ── Stats ── */
  function updateStats(users) {
    document.getElementById('statTotal').textContent     = users.length;
    document.getElementById('statActive').textContent    = users.filter(u => u.status === 'active').length;
    document.getElementById('statSuspended').textContent = users.filter(u => u.status === 'suspended').length;
    document.getElementById('statBanned').textContent    = users.filter(u => u.status === 'banned').length;
  }
 
  /* ── Search filter ── */
  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allUsers.filter(u =>
      u.username.toLowerCase().includes(q) ||
      u.email.toLowerCase().includes(q) ||
      (u.real_name || '').toLowerCase().includes(q)
    );
    renderTable(filtered);
  }
 
  /* ── Render table ── */
  function formatDate(val) {
    if (!val) return '<span class="td-muted">—</span>';
    return `<span class="td-muted">${val.replace('T', ' ').slice(0, 16)}</span>`;
  }
 
  function roleBadge(role) {
    const cls = role === 'owner' ? 'badge-owner' : role === 'admin' ? 'badge-admin' : 'badge-user';
    return `<span class="badge ${cls}">${role}</span>`;
  }
 
  function statusBadge(status) {
    const cls = status === 'active' ? 'badge-active' : status === 'suspended' ? 'badge-suspended' : 'badge-banned';
    return `<span class="badge ${cls}">${status}</span>`;
  }
 
  function renderTable(users) {
    const tbody = document.getElementById('tableBody');
    if (!users.length) {
      tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state"><span class="empty-state-icon">🔍</span>No users found.</div></td></tr>`;
      return;
    }
 
    tbody.innerHTML = users.map(user => {
      const pic = user.profile_picture
        ? `<img src="${user.profile_picture}" class="profile-pic" alt="${user.username}">`
        : `<div class="no-pic">${(user.username || '?')[0].toUpperCase()}</div>`;
 
      return `
        <tr>
          <td class="td-muted">${user.id}</td>
          <td>
            <input type="text" class="tbl-input" value="${escHtml(user.username)}" id="username-${user.id}" />
          </td>
          <td>
            <input type="email" class="tbl-input" value="${escHtml(user.email)}" id="email-${user.id}" />
          </td>
          <td>
            <input type="text" class="tbl-input" value="${escHtml(user.real_name || '')}" id="real_name-${user.id}" />
          </td>
          <td>
            <select class="tbl-select" id="role-${user.id}">
              <option value="user"  ${user.role === 'user'  ? 'selected' : ''}>User</option>
              <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
              <option value="owner" ${user.role === 'owner' ? 'selected' : ''}>Owner</option>
            </select>
          </td>
          <td>
            <select class="tbl-select" id="status-${user.id}">
              <option value="active"    ${user.status === 'active'    ? 'selected' : ''}>Active</option>
              <option value="suspended" ${user.status === 'suspended' ? 'selected' : ''}>Suspended</option>
              <option value="banned"    ${user.status === 'banned'    ? 'selected' : ''}>Banned</option>
            </select>
          </td>
          <td>${formatDate(user.last_login)}</td>
          <td>${formatDate(user.created_at)}</td>
          <td>${pic}</td>
          <td><button class="btn-update" onclick="updateUser(${user.id})">Update</button></td>
          <td><button class="btn-delete" onclick="deleteUser(${user.id})">Delete</button></td>
        </tr>
      `;
    }).join('');
  }
 
  /* ── Escape HTML ── */
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
 
  /* ── Update user ── */
  function updateUser(userId) {
    const userData = {
      id:       userId,
      username: document.getElementById(`username-${userId}`).value,
      email:    document.getElementById(`email-${userId}`).value,
      real_name:document.getElementById(`real_name-${userId}`).value,
      role:     document.getElementById(`role-${userId}`).value,
      status:   document.getElementById(`status-${userId}`).value
    };
 
    fetch('/admin/update-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(userData)
    })
    .then(r => r.json())
    .then(data => {
      showToast(data.message || 'User updated.', 'success');
      fetchUsers();
    })
    .catch(err => {
      console.error('Error updating user:', err);
      showToast('Failed to update user.', 'error');
    });
  }
 
  /* ── Delete user ── */
  function deleteUser(userId) {
    if (!confirm('Are you sure you want to delete this user? This cannot be undone.')) return;
 
    fetch('/admin/delete-user', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ id: userId })
    })
    .then(r => r.json())
    .then(data => {
      showToast(data.message || 'User deleted.', 'success');
      fetchUsers();
    })
    .catch(err => {
      console.error('Error deleting user:', err);
      showToast('Failed to delete user.', 'error');
    });
  }
</script>
</body>
</html>
