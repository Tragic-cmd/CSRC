<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
            <button class="toggle-theme">Toggle Dark Mode</button>
            <button class="admin-btn" onclick="window.location.href='/'">Camera Sizing Tool</button>
            <button class="profile-btn" onclick="window.location.href='/profile'">Profile</button>
            <button class="logout-btn" onclick="window.location.href='/logout'">Logout</button>
        </div>
        <div class="header">
            <header>
              <img src="/tragicstudios.svg" alt="Tragic Studios Logo">
              <h1>Admin Panel - User Management</h1>
            </header>
        </div>

        <!-- User Management Table -->
        <div class="table-container">
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Created</th>
                        <th>Updated</th>
                        <th>Last Login</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Full Name</th>
                        <th>DOB</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Profile Picture</th>
                        <th>Update</th>
                        <th>Delete</th> 
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Refresh Button -->
        <button onclick="fetchUsers()" class="admin-btn">Refresh Users</button>
    </div>

    <script>
        // ✅ Apply Dark Mode Setting on Load
        document.addEventListener("DOMContentLoaded", function () {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }

            // ✅ Ensure dark mode button exists and attaches event
            const themeButton = document.querySelector(".toggle-theme");
            if (themeButton) {
                console.log("Dark mode toggle button found!"); // Debugging
                themeButton.addEventListener("click", toggleDarkMode);
            } else {
            console.error("Dark mode toggle button NOT found!"); // Debugging
        }

            fetchUsers();
        });

        // ✅ Dark Mode Toggle (Ensures consistent behavior)
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        // 🔹 Fetch Users and Populate Table
        function fetchUsers() {
            fetch('/admin/get-users')
                .then(response => response.json())
                .then(users => {
                    console.log(users); // Log user data
                    const tableBody = document.querySelector("#usersTable tbody");
                    tableBody.innerHTML = "";

                    users.forEach(user => {
                        tableBody.innerHTML += `
                            <tr>
                                <td data-fulltext="${user.id}">${user.id}</td>
                                <td data-fulltext="${user.created_at}">${user.created_at}</td>
                                <td data-fulltext="${user.updated_at}">${user.updated_at}</td>
                                <td data-fulltext="${user.last_login}">${user.last_login}</td>
                                <td data-fulltext="${user.username}">
                                    <div class="input-wrapper">
                                        <input type="text" value="${user.username}" id="username-${user.id}" class="input-field">
                                    </div>
                                </td>
                                <td data-fulltext="${user.email}">
                                    <div class="input-wrapper">
                                        <input type="email" value="${user.email}" id="email-${user.id}" class="input-field">
                                    </div>
                                </td>
                                <td data-fulltext="${user.real_name}">
                                    <div class="input-wrapper">
                                        <input type="text" value="${user.real_name}" id="real_name-${user.id}" class="input-field">
                                    </div>
                                </td>
                                <td data-fulltext="${user.date_of_birth}">
                                    <div class="input-wrapper">
                                        <input type="date" value="${user.date_of_birth}" id="date_of_birth-${user.id}" class="input-field">
                                    </div>
                                </td>
                                <td data-fulltext="${user.role}">
                                    <select id="role-${user.id}" class="input-field">
                                        <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                                        <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                                        <option value="owner" ${user.role === 'owner' ? 'selected' : ''}>Owner</option>
                                    </select>
                                </td>
                                <td data-fulltext="${user.status}">
                                    <select id="status-${user.id}" class="input-field">
                                        <option value="active" ${user.status === 'active' ? 'selected' : ''}>Active</option>
                                        <option value="suspended" ${user.status === 'suspended' ? 'selected' : ''}>Suspended</option>
                                        <option value="banned" ${user.status === 'banned' ? 'selected' : ''}>Banned</option>
                                    </select>
                                </td>
                                <td>
                                    ${user.profile_picture ? `<img src="${user.profile_picture}" width="50" class="profile-pic">` : "No Image"}
                                </td>
                                <td>
                                    <button class="load-btn" onclick="updateUser(${user.id})">Update</button>
                                </td>
                                <td>
                                    <button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                })
                .catch(error => console.error("Error fetching users:", error));
        }

        // 🔹 Update User
        function updateUser(userId) {
            const userData = {
                id: userId,
                username: document.getElementById(`username-${userId}`).value,
                email: document.getElementById(`email-${userId}`).value,
                real_name: document.getElementById(`real_name-${userId}`).value,
                date_of_birth: document.getElementById(`date_of_birth-${userId}`).value,
                role: document.getElementById(`role-${userId}`).value,
                status: document.getElementById(`status-${userId}`).value,
                profile_picture: "" // Future feature: Upload profile picture
            };

            fetch('/admin/update-user', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(userData)
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
                fetchUsers();
            })
            .catch(error => console.error("Error updating user:", error));
        }

        // 🔹 Delete User
        function deleteUser(userId) {
            if (confirm("Are you sure you want to delete this user?")) {
                fetch('/admin/delete-user', {
                    method: "DELETE",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id: userId })
                })
                .then(response => response.json())
                .then(data => {
                    alert(data.message);
                    fetchUsers();
                })
                .catch(error => console.error("Error deleting user:", error));
            }
        }
    </script>
</body>
</html>
