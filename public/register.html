<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <!-- Dark Mode Toggle -->
    <div style="display: flex; justify-content: space-between; gap: 10px;">
      <button class="toggle-theme" onclick="toggleDarkMode()">Toggle Dark Mode</button>
      <a href="login.html" class="button">Login</a>
    </div>

    <h2>Register</h2>

    <!-- Registration Form -->
    <form id="registerForm" method="POST" action="/register" class="form-section">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required />
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>

      <div class="form-group">
        <label for="real_name">Full Name:</label>
        <input type="text" id="real_name" name="real_name" placeholder="Enter your full name" required />
      </div>

      <div class="form-group">
        <label for="date_of_birth">Date of Birth:</label>
        <input type="date" id="date_of_birth" name="date_of_birth" required />
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
        <p id="password-strength" class="validation-message"></p>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required />
        <p id="password-error" class="validation-error" style="display: none;">Passwords do not match.</p>
      </div>

      <div class="form-group">
        <button type="submit" class="button">Register</button>
      </div>

      <p id="registration-message" class="validation-message"></p>
    </form>

    <p>Already have an account? <a href="login.html">Login here</a></p>
  </div>

  <script>
    // 🔹 Dark Mode Toggle
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    // 🔹 Apply Saved Theme on Load
    window.onload = function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
      }
    }

    // 🔹 Live Password Strength Check
    document.getElementById('password').addEventListener('input', function () {
      const password = this.value;
      const strengthMessage = document.getElementById('password-strength');
      
      const strongPasswordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
      
      if (!strongPasswordRegex.test(password)) {
        strengthMessage.textContent = "⚠ Password must be at least 8 characters, include an uppercase letter, a number, and a special character.";
        strengthMessage.style.color = "red";
      } else {
        strengthMessage.textContent = "✔ Strong password";
        strengthMessage.style.color = "green";
      }
    });

    // 🔹 Live Password Match Validation
    document.getElementById('confirm-password').addEventListener('input', function () {
      validatePasswordMatch();
    });

    function validatePasswordMatch() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const errorText = document.getElementById('password-error');

      if (password !== confirmPassword) {
        errorText.style.display = 'block';
        return false;
      } else {
        errorText.style.display = 'none';
        return true;
      }
    }

    // 🔹 AJAX Form Submission (Prevent Reload)
    document.getElementById("registerForm").addEventListener("submit", function (event) {
      event.preventDefault(); // Prevent default form submission

      if (!validatePasswordMatch()) return;

      const formData = new FormData(this);

      fetch('/register', {
        method: "POST",
        headers: {
          "Content-Type": "application/json" // ✅ Ensure the request is JSON
        },
        body: JSON.stringify(Object.fromEntries(formData)) // ✅ Convert FormData to JSON
      })
      .then(response => response.json())
      .then(data => {
        if (data.redirect) {
          console.log("Redirecting to:", data.redirect);
          window.location.href = data.redirect; // ✅ Redirect to login page after successful registration
        } else {
          document.getElementById("registration-message").innerHTML = data.message;
        }
      })
      .catch(error => console.error("Error during registration:", error));
    });
  </script>
</body>
</html>
