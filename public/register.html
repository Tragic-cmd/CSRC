<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <div style="display: flex; justify-content: flex-end; gap: 10px;">
      <button class="toggle-theme" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </div>
    <h2>Register</h2>
    <form method="POST" action="/register" class="form-section" onsubmit="return validatePassword()">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required />
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required />
        <p id="password-error" class="validation-error" style="display: none;">Passwords do not match.</p>
      </div>
      <div class="form-group">
        <button type="submit" class="button">Register</button>
      </div>
    </form>
    <p>Already have an account? <a href="login.html">Login here</a></p>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    
    window.onload = function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
      }
    }
    
    function validatePassword() {
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const errorText = document.getElementById('password-error');
      
      if (password !== confirmPassword) {
        errorText.style.display = 'block';
        return false;
      } else {
        errorText.style.display = 'none';
        return true;
      }
    }
  </script>
</body>
</html>
