<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <!-- Dark Mode Toggle -->
    <div style="display: flex; justify-content: flex-end; gap: 10px;">
      <button class="toggle-theme" onclick="toggleDarkMode()">Toggle Dark Mode</button>

    </div>
    <div>
      <header>
        <img src="/camera.svg" alt="Tragic Studios Logo">
        <h1>Camera Server Sizing Calculator</h1>
      </header>
      <img src="/tragicstudios.svg" alt="Tragic Studios" />
    </div>
    <h2>Login</h2>

    <!-- Login Form -->
    <form id="loginForm" class="form-section">
      <div class="form-group">
        <label for="username">Username or Email:</label>
        <input type="text" id="username" name="username" placeholder="Enter your username or email" required />
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>
      <div class="form-group">
        <button type="submit" class="button">Login</button>
      </div>
    </form>
    <div class="form-group">
      <a href="register.html" class="button">Register here</a>
      <a href="forgot-password.html" class="button">Forgot Password?</a>
    </div>
  </div>

  <script>
    // 🔹 Dark Mode Toggle
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    
    // 🔹 Apply Saved Theme on Load
    window.onload = function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
      }
    };

    // 🔹 Login Form Submission with AJAX
    document.getElementById("loginForm").addEventListener("submit", function (event) {
      event.preventDefault(); // Prevent default form submission

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        alert("Please enter both username and password.");
        return;
      }

      fetch('/login', {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
      })
      .then(response => response.json())
      .then(data => {
        if (data.redirect) {
          window.location.href = data.redirect; // ✅ Redirect after login
        } else {
          alert(data.error || "Login failed. Please try again.");
        }
      })
      .catch(error => console.error("Error during login:", error));
    });
  </script>
</body>
</html>
