<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <!-- Dark Mode Toggle -->
    <div style="display: flex; justify-content: flex-end; gap: 10px;">
      <button class="toggle-theme" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </div>
    <header>
      <img src="/tragicstudios.svg" alt="Tragic Studios Logo">
      <h1>Forgot Password - Under Development</h1>
    </header>
    <p><strong>This feature is currently unavailable.</strong></p>
    <p>Enter your email below, and we will send you a password reset link.</p>

    <!-- Forgot Password Form -->
    <form id="forgotPasswordForm" method="POST" action="/request-password-reset" class="form-section">
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>
      <div class="form-group">
        <button type="submit" class="button">Send Reset Link</button>
      </div>
    </form>

    <p>Remembered your password? <a href="login.html">Login here</a></p>
  </div>

  <script>
    // 🔹 Dark Mode Toggle
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    
    // 🔹 Apply Saved Theme on Load
    window.onload = function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
      }
    };

    // 🔹 Form Validation Before Submission
    document.getElementById("forgotPasswordForm").addEventListener("submit", function (event) {
      const email = document.getElementById("email").value.trim();
      
      if (!email) {
        alert("Please enter your email address.");
        event.preventDefault(); // Stop form submission
      }
    });
  </script>
</body>
</html>
